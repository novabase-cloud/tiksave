name: Websync

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get source owner from token
        run: |
          OWNER=$(curl -s -H "Authorization: token ${{ secrets.PULL_TIKSAVE_WEB_DEPLOY_TOKEN }}" \
            https://api.github.com/user | jq -r .login)
          echo "SOURCE_OWNER=$OWNER" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_OWNER }}/tiktok-archiver-hf
          token: ${{ secrets.PULL_TIKSAVE_WEB_DEPLOY_TOKEN }}
          path: source

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PULL_TIKSAVE_WEB_DEPLOY_TOKEN }}
          path: target

      - name: Mirror template contents
        run: rsync -av --delete source/template/ target/

      - name: Commit and push
        run: |
          cd target
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || {
            git commit -m "sync: template update $(date -u +'%Y-%m-%d')"
            git push
          }
