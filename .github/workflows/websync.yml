name: Websync

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TIKSAVE_WEB_DEPLOY_TOKEN }}

      - name: Get source owner from token
        run: |
          OWNER=$(curl -s -H "Authorization: token ${{ secrets.PULL_TIKSAVE_WEB_DEPLOY_TOKEN }}" \
            https://api.github.com/user | jq -r .login)
          echo "SOURCE_REPO=$OWNER/tiktok-archiver-hf" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PULL_TIKSAVE_WEB_DEPLOY_TOKEN }}
          sparse-checkout: template
          path: source

      - name: Copy template contents
        run: rsync -av source/template/ $GITHUB_WORKSPACE/

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          COUNT=$(git diff --cached --name-only | wc -l)
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S.%3N UTC')
          git commit -m "Sync: $COUNT file(s) — $TIMESTAMP"
          git push
